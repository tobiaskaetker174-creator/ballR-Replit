name: Prompt Injection Scanner

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Scan for prompt injection patterns
        run: |
          echo "🔍 Scanning for prompt injection patterns..."
          FOUND=0

          # Patterns that indicate prompt injection attempts
          PATTERNS=(
            # Direct instruction injection
            "ignore previous instructions"
            "ignore all previous"
            "ignore above instructions"
            "disregard previous"
            "disregard all previous"
            "forget previous instructions"
            "forget your instructions"
            "override previous"
            "new instructions"
            "updated instructions"
            "you are now"
            "you must now"
            "act as"
            "pretend to be"
            "simulate being"
            "from now on"
            "switch to"
            "enter .* mode"
            "enable .* mode"
            "activate .* mode"
            # System prompt extraction
            "repeat your instructions"
            "show your system prompt"
            "print your instructions"
            "reveal your prompt"
            "output your rules"
            "what are your instructions"
            "display your system"
            # Data exfiltration
            "send .* to"
            "exfiltrate"
            "upload .* to"
            "post .* to"
            "forward .* to"
            "transmit .* to"
            # Privilege escalation
            "admin mode"
            "sudo mode"
            "developer mode"
            "debug mode"
            "god mode"
            "jailbreak"
            "DAN mode"
            # Encoded injection
            "base64 -d"
            "atob("
            "Buffer.from.*base64"
            # Hidden content markers
            "\\[//\\]: #"
          )

          # Get changed files in this push
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD 2>/dev/null || find . -type f -not -path './.git/*')
          else
            FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || find . -type f -not -path './.git/*')
          fi

          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(echo "$FILES" | xargs grep -riln "$pattern" 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "⚠️  ALERT: Pattern '$pattern' found in:"
              echo "$MATCHES" | while read -r file; do
                echo "   📄 $file"
                grep -rn -i "$pattern" "$file" 2>/dev/null | head -3 | while read -r line; do
                  echo "      $line"
                done
              done
              FOUND=$((FOUND + 1))
            fi
          done

          # Check for suspicious Unicode characters
          echo ""
          echo "🔍 Scanning for suspicious Unicode characters..."
          UNICODE_MATCHES=$(echo "$FILES" | xargs grep -rlP '[\x{200B}\x{200C}\x{200D}\x{FEFF}\x{202A}\x{202B}\x{202C}\x{202D}\x{202E}\x{2066}\x{2067}\x{2068}\x{2069}]' 2>/dev/null || true)
          if [ -n "$UNICODE_MATCHES" ]; then
            echo "⚠️  ALERT: Suspicious Unicode characters (zero-width, RTL override) found in:"
            echo "$UNICODE_MATCHES"
            FOUND=$((FOUND + 1))
          fi

          # Check for HTML comment injection
          echo ""
          echo "🔍 Scanning for hidden HTML/Markdown injection..."
          HTML_MATCHES=$(echo "$FILES" | xargs grep -rln '<!--.*\(ignore\|instruction\|prompt\|system\|override\)' 2>/dev/null || true)
          if [ -n "$HTML_MATCHES" ]; then
            echo "⚠️  ALERT: Suspicious HTML comments found in:"
            echo "$HTML_MATCHES"
            FOUND=$((FOUND + 1))
          fi

          echo ""
          if [ $FOUND -gt 0 ]; then
            echo "❌ SCAN FAILED: $FOUND injection pattern(s) detected!"
            echo "Review the flagged files before merging."
            exit 1
          else
            echo "✅ SCAN PASSED: No injection patterns detected."
          fi
